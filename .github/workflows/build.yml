name: Build Android APK
on:
  push:
    branches: [ main ] # Se activa al subir cambios a tu rama 'principal'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install flet[all] reportlab

      - name: Build APK
        run: |
          flet build apk --main principal.py
        # Usamos --main porque tu archivo se llama principal.py

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk
